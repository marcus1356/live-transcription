<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Live Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --surface2: #162030;
      --accent: #1d9bf0;
      --green: #00ba7c;
      --red: #f4212e;
      --text: #e7e9ea;
      --text-muted: #71767b;
      --border: #2f3336;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
    .logo-icon {
      width: 30px; height: 30px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .admin-badge {
      background: rgba(244,33,46,.2); color: #ff6b6b;
      padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
      text-transform: uppercase;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s;
    }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }
    .btn-danger { background: rgba(244,33,46,.15); color: #ff6b6b; border: 1px solid rgba(244,33,46,.3); }
    .btn-danger:hover { background: rgba(244,33,46,.25); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1a8cd8; }
    .btn-sm { padding: 5px 12px; font-size: 13px; border-radius: 6px; }

    /* ── Main content ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .page-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }

    /* ── Stats cards ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 36px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
    }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
    .stat-value { font-size: 36px; font-weight: 800; line-height: 1; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.green { color: var(--green); }

    /* ── Plan distribution ── */
    .plan-dist {
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px;
    }
    .plan-chip {
      padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .plan-chip.free { background: rgba(113,118,123,.2); color: var(--text-muted); }
    .plan-chip.pro { background: rgba(29,155,240,.2); color: var(--accent); }
    .plan-chip.school { background: rgba(0,186,124,.2); color: var(--green); }

    /* ── Users table section ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
    }
    .section-title { font-size: 18px; font-weight: 800; }
    .search-input {
      padding: 8px 14px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .2s; width: 220px;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead { background: var(--surface); }
    th {
      padding: 12px 16px; text-align: left;
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .8px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr { background: var(--bg); transition: background .15s; }
    tbody tr:hover { background: var(--surface); }

    .user-name { font-weight: 600; }
    .user-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .user-admin { display: inline-block; background: rgba(244,33,46,.15); color: #ff6b6b; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 6px; }

    .plan-select {
      padding: 6px 10px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; cursor: pointer;
      outline: none; transition: border-color .2s; font-family: inherit;
    }
    .plan-select:focus { border-color: var(--accent); }

    .date-cell { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .save-btn {
      padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; background: var(--accent); color: #fff;
      transition: background .2s, opacity .2s;
    }
    .save-btn:hover { background: #1a8cd8; }
    .save-btn.saved { background: var(--green); }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Loading / empty ── */
    .loading-row td { text-align: center; color: var(--text-muted); padding: 40px; }
    .empty-row td { text-align: center; color: var(--text-muted); padding: 40px; font-size: 15px; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 20px;
      font-size: 14px; z-index: 100;
      transform: translateY(80px); opacity: 0;
      transition: all .3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: #ff6b6b; }

    @media (max-width: 640px) {
      .main { padding: 20px 16px; }
      .topbar { padding: 0 16px; }
      .search-input { width: 160px; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">🌐</div>
    Live Translator
    <span class="admin-badge">Admin</span>
  </div>
  <div class="topbar-right">
    <a href="/app.html" class="btn btn-ghost">← App</a>
    <button class="btn btn-danger" onclick="logout()">Sair</button>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="page-title">Painel Administrativo</div>
  <div class="page-sub" id="adminSubtitle">Carregando...</div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">Total de usuários</div>
      <div class="stat-value accent" id="statUsers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Traduções hoje</div>
      <div class="stat-value green" id="statToday">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Traduções totais</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Por plano</div>
      <div class="plan-dist" id="planDist">—</div>
    </div>
  </div>

  <!-- Users table -->
  <div class="section-header">
    <div class="section-title">Usuários</div>
    <input type="search" class="search-input" id="searchInput" placeholder="Buscar por nome ou e-mail..." oninput="filterUsers()">
  </div>
  <div class="table-wrap">
    <table id="usersTable">
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Plano</th>
          <th>Cadastro</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr class="loading-row"><td colspan="4"><div class="spinner"></div> Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
'use strict';

const token = localStorage.getItem('lt_token');
if (!token) { window.location.href = '/auth.html'; }

let allUsers = [];

async function init() {
  // Check admin
  try {
    const meRes = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (meRes.status === 401) { logout(); return; }
    const me = await meRes.json();
    if (!me.is_admin) { window.location.href = '/app.html'; return; }
    document.getElementById('adminSubtitle').textContent = `Logado como ${me.name} (${me.email})`;
  } catch (e) {
    showToast('Erro ao verificar credenciais', 'error');
    return;
  }

  await Promise.all([loadStats(), loadUsers()]);
}

async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats', { headers: { Authorization: 'Bearer ' + token } });
    const s = await res.json();
    document.getElementById('statUsers').textContent = s.totalUsers.toLocaleString('pt-BR');
    document.getElementById('statToday').textContent = s.todayTranslations.toLocaleString('pt-BR');
    document.getElementById('statTotal').textContent = s.totalTranslations.toLocaleString('pt-BR');

    const planDist = document.getElementById('planDist');
    planDist.innerHTML = '';
    (s.byPlan || []).forEach(({ plan, n }) => {
      const chip = document.createElement('span');
      chip.className = `plan-chip ${plan}`;
      chip.textContent = `${plan}: ${n}`;
      planDist.appendChild(chip);
    });
  } catch (e) {
    console.error('Stats error:', e);
  }
}

async function loadUsers() {
  try {
    const res = await fetch('/api/admin/users', { headers: { Authorization: 'Bearer ' + token } });
    allUsers = await res.json();
    renderUsers(allUsers);
  } catch (e) {
    document.getElementById('usersBody').innerHTML = '<tr class="empty-row"><td colspan="4">Erro ao carregar usuários</td></tr>';
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('usersBody');
  if (!users.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Nenhum usuário encontrado</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => {
    const date = new Date(u.created_at * 1000).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    return `
      <tr>
        <td>
          <div class="user-name">
            ${escHtml(u.name)}
            ${u.is_admin ? '<span class="user-admin">admin</span>' : ''}
          </div>
          <div class="user-email">${escHtml(u.email)}</div>
        </td>
        <td>
          <select class="plan-select" id="planSelect-${u.id}" onchange="markDirty(${u.id})">
            <option value="free"   ${u.plan==='free'   ? 'selected':''}>Grátis</option>
            <option value="pro"    ${u.plan==='pro'    ? 'selected':''}>Pro</option>
            <option value="school" ${u.plan==='school' ? 'selected':''}>Escola</option>
          </select>
        </td>
        <td class="date-cell">${date}</td>
        <td>
          <button class="save-btn" id="saveBtn-${u.id}" onclick="savePlan(${u.id})" disabled>
            Salvar
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

function markDirty(userId) {
  const btn = document.getElementById('saveBtn-' + userId);
  if (btn) { btn.disabled = false; btn.className = 'save-btn'; btn.textContent = 'Salvar'; }
}

async function savePlan(userId) {
  const select = document.getElementById('planSelect-' + userId);
  const btn = document.getElementById('saveBtn-' + userId);
  const plan = select.value;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`/api/admin/users/${userId}/plan`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ plan }),
    });
    if (!res.ok) {
      const d = await res.json();
      showToast('Erro: ' + (d.error || 'falha'), 'error');
      btn.disabled = false;
      btn.textContent = 'Salvar';
      return;
    }
    btn.className = 'save-btn saved';
    btn.textContent = '✓ Salvo';
    const user = allUsers.find(u => u.id === userId);
    if (user) user.plan = plan;
    showToast('Plano atualizado com sucesso', 'success');
    // Refresh stats
    loadStats();
  } catch (e) {
    showToast('Erro de conexão', 'error');
    btn.disabled = false;
    btn.textContent = 'Salvar';
  }
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function logout() {
  localStorage.removeItem('lt_token');
  localStorage.removeItem('lt_user');
  window.location.href = '/auth.html';
}

init();
</script>
</body>
</html>
