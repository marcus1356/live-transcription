<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Live Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --surface2: #162030;
      --accent: #1d9bf0;
      --accent-hover: #1a8cd8;
      --green: #00ba7c;
      --red: #f4212e;
      --text: #e7e9ea;
      --text-muted: #71767b;
      --border: #2f3336;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; padding: 16px 24px;
      background: rgba(10,14,19,.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 17px; color: var(--text);
      text-decoration: none;
    }
    .logo-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 420px;
      padding: 36px 32px;
      margin-top: 80px;
    }

    .tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border-radius: 8px; padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border-radius: 6px;
      background: none; border: none; color: var(--text-muted);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    .form-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .form-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px;
      font-family: inherit; transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .error-msg {
      background: rgba(244,33,46,.12); border: 1px solid rgba(244,33,46,.3);
      color: #ff6b6b; border-radius: 8px; padding: 12px 16px;
      font-size: 14px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .forgot-link {
      display: block; text-align: right; font-size: 13px;
      color: var(--text-muted); margin-top: 4px; cursor: pointer;
    }
    .forgot-link:hover { color: var(--accent); text-decoration: none; }

    .terms {
      font-size: 12px; color: var(--text-muted); text-align: center;
      margin-top: 20px; line-height: 1.6;
    }
    .terms a { color: var(--text-muted); }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="logo">
    <div class="logo-icon">🌐</div>
    Live Translator
  </a>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab-btn" id="tabLogin" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Criar conta</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <!-- Login form -->
  <div id="formLogin">
    <h1 class="form-title">Bem-vindo de volta</h1>
    <p class="form-sub">Entre na sua conta para continuar</p>
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="loginPassword">Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
        <span class="forgot-link" onclick="forgotPassword()">Esqueci minha senha</span>
      </div>
      <button type="submit" class="btn-submit" id="btnLogin">Entrar</button>
    </form>
    <div class="divider">ou</div>
    <p style="text-align:center;font-size:14px;color:var(--text-muted)">
      Não tem conta? <a href="#" onclick="switchTab('register')">Criar grátis</a>
    </p>
  </div>

  <!-- Register form -->
  <div id="formRegister" style="display:none">
    <h1 class="form-title">Criar conta grátis</h1>
    <p class="form-sub">30 traduções/dia sem cartão de crédito</p>
    <form onsubmit="handleRegister(event)">
      <div class="field">
        <label for="regName">Seu nome</label>
        <input type="text" id="regName" placeholder="João Silva" required autocomplete="name">
      </div>
      <div class="field">
        <label for="regEmail">E-mail</label>
        <input type="email" id="regEmail" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="regPassword">Senha</label>
        <input type="password" id="regPassword" placeholder="mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn-submit" id="btnRegister">Criar conta</button>
    </form>
    <div class="divider">ou</div>
    <p style="text-align:center;font-size:14px;color:var(--text-muted)">
      Já tem conta? <a href="#" onclick="switchTab('login')">Entrar</a>
    </p>
    <p class="terms">
      Ao criar uma conta você concorda com os
      <a href="#">Termos de Uso</a> e
      <a href="#">Política de Privacidade</a>.
    </p>
  </div>
</div>

<script>
  // Redirect if already logged in
  const token = localStorage.getItem('lt_token');
  if (token) window.location.href = '/app.html';

  // Check URL param for tab
  const params = new URLSearchParams(window.location.search);
  if (params.get('tab') === 'register') {
    switchTab('register');
  } else {
    switchTab('login');
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
    document.getElementById('formRegister').style.display = isLogin ? 'none' : 'block';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'btnLogin' ? 'Entrar' : 'Criar conta';
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideError();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    setLoading('btnLogin', true);
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Erro ao fazer login'); return; }
      localStorage.setItem('lt_token', data.token);
      localStorage.setItem('lt_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch (err) {
      showError('Erro de conexão. Tente novamente.');
    } finally {
      setLoading('btnLogin', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideError();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (password.length < 6) { showError('Senha deve ter ao menos 6 caracteres'); return; }
    setLoading('btnRegister', true);
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Erro ao criar conta'); return; }
      localStorage.setItem('lt_token', data.token);
      localStorage.setItem('lt_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch (err) {
      showError('Erro de conexão. Tente novamente.');
    } finally {
      setLoading('btnRegister', false);
    }
  }

  function forgotPassword() {
    alert('Para redefinir sua senha, entre em contato: contato@livetranslator.com.br');
  }
</script>
</body>
</html>
