# ── Live Translator – Nginx reverse proxy ─────────────────────────────────────

# Rate limiting: 10 req/s per IP (burst 30)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream app {
    server app:3001;
    keepalive 32;
}

# ── HTTP → redirect to HTTPS (comment out if no SSL yet) ──────────────────────
server {
    listen 80;
    server_name _;

    # Uncomment when you have a domain + SSL cert:
    # return 301 https://$host$request_uri;

    # During dev / no SSL: proxy directly
    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rate-limit API endpoints
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://app;
        }

        # Upload limit for audio files (Whisper)
        client_max_body_size 30M;
    }
}

